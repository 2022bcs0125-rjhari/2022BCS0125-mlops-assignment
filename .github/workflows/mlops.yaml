name: MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:

    # 1️ Code Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3 Install Dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          pandas numpy scikit-learn mlflow joblib \
          fastapi uvicorn python-multipart \
          "pathspec==0.11.2" \
          "dvc[s3]==3.30.3" \
          "s3fs==2023.6.0" \
          "aiobotocore==2.5.0"

    # 4 DVC Pull
    - name: DVC Pull
      run: |
        dvc pull

    # 5️ Train Model
    - name: Train Model
      run: |
        python src/train.py

    # 6 Show Metrics
    - name: Show Metrics
      run: |
        echo "Generated Metrics:"
        cat metrics.json || echo "metrics.json not found"

    # 7 Upload MLflow results
    - name: Upload MLflow results
      uses: actions/upload-artifact@v4
      with:
        name: mlruns
        path: mlruns/

    # 8 Upload Metrics
    - name: Upload Metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.json

    # 9 Upload Model
    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: model
        path: models/model.pkl

    - name: Generate Summary
      run: |
        echo "Current dir:"
        pwd
        echo "Files:"
        ls -la

        echo "# Experiment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Name:** R J Hari" >> $GITHUB_STEP_SUMMARY
        echo "**Roll Number:** 2022BCS0125" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Metrics" >> $GITHUB_STEP_SUMMARY

        if [ -f metrics.json ]; then
          echo "metrics.json found " >> $GITHUB_STEP_SUMMARY
          cat metrics.json >> $GITHUB_STEP_SUMMARY
        else
          echo "metrics.json NOT found" >> $GITHUB_STEP_SUMMARY
        fi
    - name: Build Docker Image
      run: docker build -t 2022bcs0125rjhari/2022bcs0125-mlops .

    - name: Push Docker Image
      run: |
        echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin
        docker push 2022bcs0125rjhari/2022bcs0125-mlops